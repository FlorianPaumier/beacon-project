framework:
    secret: 'test'
    test: true
    router:
        utf8: true
        resource: '%kernel.project_dir%/config/routes.php'
        type: php
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.mock_file

twig:
    strict_variables: true
    paths:
        '%kernel.project_dir%/../../../templates': BeaconAdmin

beacon_admin:
    route_prefix: /admin
    title: 'Beacon Admin'

security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
    providers:
        in_memory:
            memory: ~
    firewalls:
        main:
            lazy: true
            provider: in_memory
