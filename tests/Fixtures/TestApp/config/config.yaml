framework:
    secret: 'test'
    test: true
    router:
        utf8: true
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.mock_file

twig:
    strict_variables: true
    exception_controller: null
    paths:
        '%kernel.project_dir%/../../templates': BeaconAdmin

security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
    providers:
        in_memory:
            memory: ~
    firewalls:
        main:
            lazy: true
            provider: in_memory
