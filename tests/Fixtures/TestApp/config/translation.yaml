framework:
    secret: 'test'
    test: true
    default_locale: fr
    router:
        utf8: true
        resource: '%kernel.project_dir%/config/routes.php'
        type: php
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.mock_file
    translator:
        default_path: '%kernel.project_dir%/translations'
        paths:
            - '%kernel.project_dir%/../../../translations'

twig:
    strict_variables: true
    paths:
        '%kernel.project_dir%/../../../templates': BeaconAdmin

beacon_admin:
    route_prefix: /admin
    title: 'Beacon Admin'

security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext
    providers:
        in_memory:
            memory:
                users:
                    admin_user:  { password: 'admin_pass', roles: ['ROLE_ADMIN'] }
    firewalls:
        main:
            lazy: true
            provider: in_memory
            http_basic: ~

doctrine:
    dbal:
        url: 'sqlite:///:memory:'
    orm:
        auto_mapping: true
        mappings:
            TestApp:
                dir: '%kernel.project_dir%/Entity'
                prefix: 'Devgeek\BeaconAdmin\Tests\Fixtures\TestApp\Entity'
                type: attribute

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true
