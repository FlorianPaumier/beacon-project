beacon_admin:
    # URL prefix for all admin routes (default: /admin)
    route_prefix: /admin

    # Title shown in the admin header and <title> tag
    title: 'Beacon Admin'

    # Default theme name — must be a key in "themes"
    default_theme: modern

    # Theme name → CSS file path mapping
    themes:
        modern: bundles/beaconadmin/beacon-modern.css
        enterprise: bundles/beaconadmin/beacon-enterprise.css
        brut: bundles/beaconadmin/beacon-brut.css

    # Sidebar navigation
    # menu:
    #     - { label: Dashboard, route: beacon_admin_dashboard, icon: home }
    #     - { label: Content, icon: file-text, children:
    #         - { label: Articles, route: beacon_admin_crud_article }
    #         - { label: Pages, route: beacon_admin_crud_page }
    #       }
    #     - { label: Users, route: beacon_admin_crud_user, icon: users, role: ROLE_SUPER_ADMIN }

    # File upload configuration
    upload:
        target_directory: '%kernel.project_dir%/public/uploads'
        public_path: /uploads
        allowed_mime_types: [image/jpeg, image/png, image/gif, image/webp]
        max_size: 10485760  # 10 MB

    # Security
    security:
        role: ROLE_ADMIN
        voters: true  # Enable BeaconAccessVoter for #[BeaconAccess] attribute checks
        redirect_to_login: true  # Redirect unauthenticated users to the login page
        login_route: 'beacon_admin_login'  # Route name for the login page
        # Restrict login redirect to these locale codes (empty = auto-detect from browser)
        # locales: [en, fr, de]

    # Branding
    brand:
        name: 'Beacon Admin'
        # logo_path: ~
        # favicon_path: ~
        primary_color: '#2563eb'
        accent_color: '#0ea5e9'
        # support_email: ~
